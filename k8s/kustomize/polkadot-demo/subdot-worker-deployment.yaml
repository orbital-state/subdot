apiVersion: apps/v1
kind: Deployment
metadata:
  name: subdot-worker
  namespace: subdot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: subdot-worker
  template:
    metadata:
      labels:
        app: subdot-worker
    spec:
      containers:
        - name: subdot-worker
          image: your-image:latest
          command: ["subdot-worker"]
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"