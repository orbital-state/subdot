apiVersion: apps/v1
kind: Deployment
metadata:
  name: subdot-manager
  namespace: subdot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: subdot-manager
  template:
    metadata:
      labels:
        app: subdot-manager
    spec:
      containers:
        - name: subdot-manager
          image: orbitalstate/subdot:latest
          args: ["manager", "--config", "/app/subdot.toml"]
          env:
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: nats-config
                  key: NATS_URL          
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"